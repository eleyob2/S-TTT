<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#31081F;--accent:#ABDFAE;--light:#FFE3DC;--mid:#808F85;
  --dark2:#4a0e2e;--accent2:#8fcf93;--mid2:#6a7870;
  --text-on-dark:#FFE3DC;--text-on-accent:#1a3d1c;--text-on-light:#31081F;--text-on-mid:#f0ede8;
}
body{font-family:var(--font-sans,sans-serif);background:var(--light);color:var(--text-on-light);min-height:600px}
.app{display:grid;grid-template-rows:auto 1fr auto;min-height:600px}

/* HEADER */
.header{background:var(--dark);color:var(--text-on-dark);padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:17px;font-weight:500;letter-spacing:.3px;flex:0 0 auto}
.selects{display:flex;gap:10px;flex:1;flex-wrap:wrap}
select{background:var(--dark2);color:var(--text-on-dark);border:1px solid rgba(171,223,174,.3);border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;outline:none}
select:focus{border-color:var(--accent)}

/* PROGRESS BAR */
.progress-wrap{background:var(--dark);padding:0 20px 12px}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,227,220,.6);margin-bottom:5px}
.progress-bar{background:rgba(255,255,255,.15);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:20px;transition:width .4s ease}
.points-row{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:var(--dark2);font-size:12px;color:var(--text-on-dark)}
.pts-badge{background:var(--accent);color:var(--text-on-accent);border-radius:20px;padding:3px 10px;font-weight:500;font-size:13px}

/* MAIN */
.main{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.question-card{background:#fff;border-radius:12px;border:1px solid rgba(49,8,31,.12);padding:18px}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{background:var(--dark);color:var(--text-on-dark);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500}
.q-diff{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500}
.diff-easy{background:#e6f9e8;color:#1a5c1e}
.diff-medium{background:#fff3e0;color:#7a4100}
.diff-hard{background:#fde8e8;color:#8b1a1a}
.q-text{font-size:15px;font-weight:500;color:var(--text-on-light);line-height:1.5}

/* OPTIONS */
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.opt{background:var(--light);border:1.5px solid rgba(128,143,133,.3);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;text-align:left;transition:all .18s;color:var(--text-on-light);position:relative;display:flex;align-items:center;gap:10px}
.opt-letter{width:22px;height:22px;border-radius:50%;background:var(--mid);color:var(--text-on-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.opt:hover:not(.locked){background:var(--accent);border-color:var(--accent2);color:var(--text-on-accent)}
.opt:hover:not(.locked) .opt-letter{background:var(--text-on-accent);color:var(--accent)}
.opt.selected{background:var(--mid);border-color:var(--mid2);color:var(--text-on-mid)}
.opt.selected .opt-letter{background:var(--text-on-mid);color:var(--mid)}
.opt.correct{background:#c8f0cb;border-color:#4caf50;color:#1a3d1c}
.opt.correct .opt-letter{background:#4caf50;color:#fff}
.opt.wrong{background:#fcd5d5;border-color:#e57373;color:#5c1a1a}
.opt.wrong .opt-letter{background:#e57373;color:#fff}

/* FEEDBACK */
.feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;align-items:center;gap:8px}
.feedback.show{display:flex}
.feedback.ok{background:#e6f9e8;color:#1a5c1e;border:1px solid #a5d6a7}
.feedback.bad{background:#fde8e8;color:#8b1a1a;border:1px solid #ef9a9a}
.icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.icon.ok-i{background:#4caf50;color:#fff}
.icon.bad-i{background:#e57373;color:#fff}

/* NAV BUTTONS */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:4px}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid;font-weight:500;transition:all .15s}
.btn-outline{background:transparent;border-color:var(--mid);color:var(--mid2)}
.btn-outline:hover{background:var(--mid);color:var(--text-on-mid)}
.btn-primary{background:var(--dark);color:var(--text-on-dark);border-color:var(--dark)}
.btn-primary:hover{background:var(--dark2)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* TRACKER */
.tracker{background:var(--dark);padding:10px 20px;display:flex;align-items:center;justify-content:flex-end;gap:14px}
.tracker-item{display:flex;align-items:center;gap:6px;font-size:12px}
.t-dot{width:10px;height:10px;border-radius:50%}
.t-dot.ok{background:var(--accent)}
.t-dot.bad{background:#e57373}
.tracker-count{font-size:15px;font-weight:500}
.ok-count{color:var(--accent)}
.bad-count{color:#e57373}
.tracker-sep{color:rgba(255,227,220,.3);font-size:16px}

/* SUBJECT TABS */
.subject-row{display:flex;gap:6px;padding:10px 20px 0;background:var(--dark);flex-wrap:wrap}
.subj-tab{padding:5px 12px;border-radius:6px 6px 0 0;font-size:12px;cursor:pointer;border:none;font-weight:500;transition:all .15s}
.subj-tab.active{background:var(--light);color:var(--dark)}
.subj-tab:not(.active){background:rgba(255,255,255,.1);color:var(--text-on-dark)}
.subj-tab:hover:not(.active){background:rgba(255,255,255,.2)}
</style>

<div class="app">
  <div>
    <div class="header">
      <h1>Quiz</h1>
      <div class="selects">
        <select id="subjectSel" onchange="changeSubject()">
          <option value="science">Science</option>
          <option value="history">History</option>
          <option value="math">Mathematics</option>
          <option value="geography">Geography</option>
        </select>
        <select id="diffSel" onchange="changeDiff()">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
    </div>
    <div class="subject-row" id="subjectTabs"></div>
    <div class="progress-wrap">
      <div class="progress-labels">
        <span id="progLabel">Question 1 of 5</span>
        <span id="progPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="points-row">
      <span style="color:rgba(255,227,220,.7)">Total Points</span>
      <span class="pts-badge" id="pointsBadge">0 pts</span>
    </div>
    <div class="main">
  </div>

    <div class="question-card" id="qCard">
      <div class="q-meta">
        <span class="q-num" id="qNum">Q1</span>
        <span class="q-diff diff-easy" id="qDiff">Easy</span>
      </div>
      <div class="q-text" id="qText">Loading question...</div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="feedback">
        <div class="icon" id="fbIcon"></div>
        <span id="fbText"></span>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-outline" id="prevBtn" onclick="navigate(-1)">← Previous</button>
      <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <div class="tracker">
    <div class="tracker-item">
      <div class="t-dot ok"></div>
      <span style="color:rgba(255,227,220,.6);font-size:11px">Correct</span>
      <span class="tracker-count ok-count" id="correctCount">0</span>
    </div>
    <div class="tracker-sep">|</div>
    <div class="tracker-item">
      <div class="t-dot bad"></div>
      <span style="color:rgba(255,227,220,.6);font-size:11px">Incorrect</span>
      <span class="tracker-count bad-count" id="incorrectCount">0</span>
    </div>
    <div class="tracker-sep">|</div>
    <div class="tracker-item">
      <span style="color:rgba(255,227,220,.6);font-size:11px">Skipped</span>
      <span class="tracker-count" style="color:rgba(255,227,220,.5)" id="skippedCount">0</span>
    </div>
  </div>
</div>

<script>
const DB = {
  science:{
    easy:[
      {q:"What is the chemical symbol for water?",opts:["H2O","CO2","NaCl","O2"],ans:0,exp:"Water is made of two hydrogen atoms and one oxygen atom."},
      {q:"How many planets are in our solar system?",opts:["7","8","9","10"],ans:1,exp:"There are 8 planets: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune."},
      {q:"What is the powerhouse of the cell?",opts:["Nucleus","Ribosome","Mitochondria","Golgi body"],ans:2,exp:"The mitochondria generates most of the cell's ATP energy."},
      {q:"What gas do plants absorb during photosynthesis?",opts:["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"],ans:2,exp:"Plants absorb CO₂ and release oxygen during photosynthesis."},
      {q:"What is the speed of light (approx)?",opts:["300,000 km/s","150,000 km/s","500,000 km/s","30,000 km/s"],ans:0,exp:"Light travels at approximately 299,792 km/s in a vacuum."},
    ],
    medium:[
      {q:"What is the atomic number of carbon?",opts:["6","8","12","14"],ans:0,exp:"Carbon has 6 protons, giving it atomic number 6."},
      {q:"Which organ produces insulin?",opts:["Liver","Kidney","Pancreas","Stomach"],ans:2,exp:"The pancreas produces insulin to regulate blood sugar."},
      {q:"What is Newton's 2nd law expressed as?",opts:["F=ma","E=mc²","PV=nRT","v=u+at"],ans:0,exp:"Force equals mass times acceleration."},
      {q:"DNA stands for:",opts:["Deoxyribonucleic acid","Dinitrogen acid","Deoxyribonitric acid","Double nucleic acid"],ans:0,exp:"DNA = Deoxyribonucleic acid, the molecule carrying genetic info."},
      {q:"Which element has the symbol Fe?",opts:["Fluorine","Fermium","Iron","Francium"],ans:2,exp:"Fe comes from the Latin word 'Ferrum', meaning iron."},
    ],
    hard:[
      {q:"What is the Heisenberg Uncertainty Principle?",opts:["Energy is conserved","Position & momentum can't both be precisely known","Light speed is constant","Matter equals energy"],ans:1,exp:"It states that the more precisely position is known, the less precisely momentum can be known."},
      {q:"Which process converts glucose to pyruvate?",opts:["Krebs cycle","Oxidative phosphorylation","Glycolysis","Beta-oxidation"],ans:2,exp:"Glycolysis breaks down glucose into two pyruvate molecules in the cytoplasm."},
      {q:"What is the half-life of Carbon-14?",opts:["1,000 years","5,730 years","10,000 years","50,000 years"],ans:1,exp:"C-14 has a half-life of approximately 5,730 years, used in radiocarbon dating."},
      {q:"Which quantum number describes orbital shape?",opts:["Principal (n)","Angular momentum (l)","Magnetic (ml)","Spin (ms)"],ans:1,exp:"The angular momentum quantum number (l) defines the shape of atomic orbitals."},
      {q:"What is CRISPR used for?",opts:["Protein synthesis","DNA editing","Cell division","Virus replication"],ans:1,exp:"CRISPR-Cas9 is a gene editing tool that can precisely modify DNA sequences."},
    ]
  },
  history:{
    easy:[
      {q:"In what year did World War II end?",opts:["1943","1944","1945","1946"],ans:2,exp:"WWII ended in 1945 with Germany's surrender in May and Japan's in September."},
      {q:"Who was the first US President?",opts:["John Adams","Thomas Jefferson","George Washington","Benjamin Franklin"],ans:2,exp:"George Washington served as the 1st President from 1789 to 1797."},
      {q:"The French Revolution began in which year?",opts:["1776","1789","1804","1815"],ans:1,exp:"The French Revolution began in 1789 with the storming of the Bastille."},
      {q:"Which empire built the Colosseum?",opts:["Greek","Ottoman","Roman","Byzantine"],ans:2,exp:"The Roman Empire built the Colosseum, completed in 80 AD."},
      {q:"Who painted the Mona Lisa?",opts:["Michelangelo","Raphael","Leonardo da Vinci","Caravaggio"],ans:2,exp:"Leonardo da Vinci painted the Mona Lisa between 1503 and 1519."},
    ],
    medium:[
      {q:"Which treaty ended World War I?",opts:["Treaty of Paris","Treaty of Versailles","Treaty of Ghent","Treaty of Utrecht"],ans:1,exp:"The Treaty of Versailles in 1919 officially ended WWI."},
      {q:"Who led the Cuban Revolution?",opts:["Che Guevara","Raúl Castro","Fidel Castro","Fulgencio Batista"],ans:2,exp:"Fidel Castro led the Cuban Revolution, overthrowing Batista in 1959."},
      {q:"The Berlin Wall fell in which year?",opts:["1987","1988","1989","1991"],ans:2,exp:"The Berlin Wall fell on November 9, 1989."},
      {q:"Which civilization built Machu Picchu?",opts:["Aztec","Maya","Inca","Olmec"],ans:2,exp:"The Inca Empire built Machu Picchu in the 15th century."},
      {q:"What year did the Titanic sink?",opts:["1910","1911","1912","1913"],ans:2,exp:"The Titanic sank on April 15, 1912 after hitting an iceberg."},
    ],
    hard:[
      {q:"Who was the first female Prime Minister of the UK?",opts:["Queen Victoria","Margaret Thatcher","Theresa May","Mary I"],ans:1,exp:"Margaret Thatcher served as UK PM from 1979 to 1990."},
      {q:"The Thirty Years' War was primarily fought in:",opts:["France","Italy","Holy Roman Empire","England"],ans:2,exp:"The war (1618–1648) was fought mainly in the Holy Roman Empire (modern Germany)."},
      {q:"Which pharaoh built the Great Pyramid of Giza?",opts:["Ramesses II","Tutankhamun","Khufu","Akhenaten"],ans:2,exp:"Pharaoh Khufu (Cheops) built the Great Pyramid around 2560 BC."},
      {q:"The Meiji Restoration occurred in which country?",opts:["China","Korea","Japan","Vietnam"],ans:2,exp:"Japan's Meiji Restoration in 1868 modernized the country under Emperor Meiji."},
      {q:"Who wrote 'The Communist Manifesto'?",opts:["Lenin & Stalin","Marx & Engels","Trotsky & Mao","Hegel & Feuerbach"],ans:1,exp:"Karl Marx and Friedrich Engels published The Communist Manifesto in 1848."},
    ]
  },
  math:{
    easy:[
      {q:"What is the value of π (pi) to 2 decimal places?",opts:["3.12","3.14","3.16","3.18"],ans:1,exp:"Pi (π) is approximately 3.14159..."},
      {q:"What is 12 × 12?",opts:["132","144","124","148"],ans:1,exp:"12 × 12 = 144, a perfect square."},
      {q:"What is the square root of 64?",opts:["6","7","8","9"],ans:2,exp:"8 × 8 = 64, so √64 = 8."},
      {q:"What is 15% of 200?",opts:["25","30","35","40"],ans:1,exp:"15% × 200 = 0.15 × 200 = 30."},
      {q:"What is the area of a square with side 5?",opts:["20","10","25","15"],ans:2,exp:"Area of a square = side² = 5² = 25."},
    ],
    medium:[
      {q:"What is the derivative of x²?",opts:["x","2x","x²","2"],ans:1,exp:"d/dx(x²) = 2x by the power rule."},
      {q:"Solve: 2x + 5 = 17",opts:["x=5","x=6","x=7","x=8"],ans:1,exp:"2x = 12, so x = 6."},
      {q:"What is the sum of angles in a triangle?",opts:["90°","120°","180°","360°"],ans:2,exp:"The interior angles of any triangle sum to 180°."},
      {q:"What is log₁₀(1000)?",opts:["2","3","4","10"],ans:1,exp:"10³ = 1000, so log₁₀(1000) = 3."},
      {q:"How many sides does a hexagon have?",opts:["5","6","7","8"],ans:1,exp:"A hexagon has 6 sides and 6 angles."},
    ],
    hard:[
      {q:"What is the integral of sin(x)?",opts:["cos(x)+C","-cos(x)+C","sin(x)+C","-sin(x)+C"],ans:1,exp:"∫sin(x)dx = -cos(x) + C."},
      {q:"Euler's identity is e^(iπ) + ?",opts:["0","1","-1","i"],ans:2,exp:"Euler's identity: e^(iπ) + 1 = 0, so the answer is 1."},
      {q:"What is the determinant of [[3,1],[2,4]]?",opts:["10","12","14","6"],ans:0,exp:"det = (3×4) - (1×2) = 12 - 2 = 10."},
      {q:"Which is a prime number?",opts:["91","97","99","93"],ans:1,exp:"97 is prime. 91=7×13, 99=9×11, 93=3×31."},
      {q:"Solve x² - 5x + 6 = 0:",opts:["x=1,6","x=2,3","x=1,5","x=3,4"],ans:1,exp:"Factor: (x-2)(x-3)=0, so x=2 or x=3."},
    ]
  },
  geography:{
    easy:[
      {q:"What is the capital of France?",opts:["Berlin","Madrid","Paris","Rome"],ans:2,exp:"Paris is the capital and largest city of France."},
      {q:"What is the largest ocean on Earth?",opts:["Atlantic","Indian","Arctic","Pacific"],ans:3,exp:"The Pacific Ocean is the largest, covering about 165 million km²."},
      {q:"Which is the longest river in the world?",opts:["Amazon","Mississippi","Nile","Yangtze"],ans:2,exp:"The Nile River in Africa is approximately 6,650 km long."},
      {q:"What is the smallest country in the world?",opts:["Monaco","Liechtenstein","Vatican City","San Marino"],ans:2,exp:"Vatican City, at 0.44 km², is the world's smallest country."},
      {q:"On which continent is the Sahara Desert?",opts:["Asia","Australia","Africa","South America"],ans:2,exp:"The Sahara is the world's largest hot desert, located in North Africa."},
    ],
    medium:[
      {q:"What is the capital of Australia?",opts:["Sydney","Melbourne","Brisbane","Canberra"],ans:3,exp:"Canberra, not Sydney, is Australia's capital city."},
      {q:"Which country has the most natural lakes?",opts:["USA","Russia","China","Canada"],ans:3,exp:"Canada has more lakes than any other country — about 879,800."},
      {q:"Mount Everest is in which mountain range?",opts:["Andes","Alps","Rockies","Himalayas"],ans:3,exp:"Mount Everest is part of the Himalayan mountain range."},
      {q:"What percentage of Earth's surface is water?",opts:["51%","61%","71%","81%"],ans:2,exp:"About 71% of Earth's surface is covered by water."},
      {q:"Which country has the most time zones?",opts:["USA","Russia","China","France"],ans:3,exp:"France, including its overseas territories, spans 12 time zones."},
    ],
    hard:[
      {q:"The Mariana Trench is in which ocean?",opts:["Atlantic","Indian","Arctic","Pacific"],ans:3,exp:"The Mariana Trench, Earth's deepest point, is in the western Pacific Ocean."},
      {q:"Which country borders the most other countries?",opts:["Russia","China","Brazil","Germany"],ans:0,exp:"Russia borders 14 countries, more than any other nation."},
      {q:"What is the capital of Kazakhstan?",opts:["Almaty","Nur-Sultan","Shymkent","Aktobe"],ans:1,exp:"Nur-Sultan (formerly Astana) is Kazakhstan's capital since 1997."},
      {q:"Lake Baikal holds what % of world's fresh water?",opts:["10%","15%","20%","25%"],ans:2,exp:"Lake Baikal contains about 20% of the world's unfrozen surface fresh water."},
      {q:"Which is the smallest continent by area?",opts:["Europe","Antarctica","Australia","South America"],ans:2,exp:"Australia is the smallest continent at approximately 7.7 million km²."},
    ]
  }
};

const SUBJECTS = ["science","history","math","geography"];
const DIFF_PTS = {easy:10,medium:20,hard:30};
const LABELS = {science:"Science",history:"History",math:"Mathematics",geography:"Geography"};

let state = {
  subject:"math", diff:"easy",
  qIdx:0,
  answers:{}, // key: "subj-diff-idx" -> {selected, correct}
  points:0, correct:0, incorrect:0
};

function getKey(idx){ return `${state.subject}-${state.diff}-${idx}`; }
function getQs(){ return DB[state.subject][state.diff]; }

function buildTabs(){
  const el = document.getElementById("subjectTabs");
  el.innerHTML = SUBJECTS.map(s=>`<button class="subj-tab${s===state.subject?' active':''}" onclick="setSubject('${s}')">${LABELS[s]}</button>`).join("");
}

function setSubject(s){
  state.subject=s; state.diff=document.getElementById("diffSel").value;
  state.qIdx=0; buildTabs(); render();
}

function changeSubject(){
  state.subject=document.getElementById("subjectSel").value;
  state.qIdx=0; buildTabs(); render();
}

function changeDiff(){
  state.diff=document.getElementById("diffSel").value;
  state.qIdx=0; render();
}

function render(){
  const qs = getQs();
  const q = qs[state.qIdx];
  const key = getKey(state.qIdx);
  const answered = state.answers[key];

  document.getElementById("qNum").textContent = `Q${state.qIdx+1}`;
  const diffEl = document.getElementById("qDiff");
  diffEl.textContent = state.diff.charAt(0).toUpperCase()+state.diff.slice(1);
  diffEl.className = `q-diff diff-${state.diff}`;
  document.getElementById("qText").textContent = q.q;

  const letters = ["A","B","C","D"];
  const optsEl = document.getElementById("opts");
  optsEl.innerHTML = q.opts.map((o,i)=>{
    let cls = "opt";
    if(answered!==undefined){
      cls+=" locked";
      if(i===q.ans) cls+=" correct";
      else if(i===answered.selected && answered.selected!==q.ans) cls+=" wrong";
    }
    return `<button class="${cls}" onclick="pick(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <span>${o}</span>
    </button>`;
  }).join("");

  const fb = document.getElementById("feedback");
  const fbIcon = document.getElementById("fbIcon");
  const fbText = document.getElementById("fbText");
  if(answered!==undefined){
    fb.className = `feedback show ${answered.correct?'ok':'bad'}`;
    fbIcon.className = `icon ${answered.correct?'ok-i':'bad-i'}`;
    fbIcon.textContent = answered.correct?"✓":"✕";
    fbText.textContent = answered.correct ? "Correct! "+q.exp : "Incorrect. "+q.exp;
  } else {
    fb.className="feedback";
  }

  const done = Object.keys(state.answers).filter(k=>k.startsWith(`${state.subject}-${state.diff}-`)).length;
  const pct = Math.round((done/qs.length)*100);
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("progLabel").textContent = `Question ${state.qIdx+1} of ${qs.length}`;
  document.getElementById("progPct").textContent = pct+"%";
  document.getElementById("pointsBadge").textContent = state.points+" pts";
  document.getElementById("correctCount").textContent = state.correct;
  document.getElementById("incorrectCount").textContent = state.incorrect;

  const skipped = qs.length - done - (answered!==undefined?0:0);
  document.getElementById("skippedCount").textContent = Math.max(0, qs.length - done);

  document.getElementById("prevBtn").disabled = state.qIdx===0;
  document.getElementById("nextBtn").textContent = state.qIdx===qs.length-1 ? "Finish" : "Next →";
}

function pick(i){
  const key = getKey(state.qIdx);
  if(state.answers[key]!==undefined) return;
  const qs = getQs();
  const correct = i===qs[state.qIdx].ans;
  state.answers[key] = {selected:i, correct};
  if(correct){ state.correct++; state.points+=DIFF_PTS[state.diff]; }
  else { state.incorrect++; }
  render();
}

function navigate(dir){
  const qs = getQs();
  state.qIdx = Math.max(0, Math.min(qs.length-1, state.qIdx+dir));
  if(state.qIdx===qs.length-1 && dir===1 && Object.keys(state.answers).filter(k=>k.startsWith(`${state.subject}-${state.diff}-`)).length===qs.length){
    const s = state.subject; const d = state.diff;
    const total = qs.length; const c = Object.values(state.answers).filter(a=>a.correct&&a===state.answers[`${s}-${d}-${Object.values(state.answers).indexOf(a)}`]).length;
    sendPrompt(`I just finished the ${LABELS[s]} quiz on ${d} difficulty. I got ${state.correct} correct and ${state.incorrect} incorrect, earning ${state.points} points total. Can you give me feedback on my performance and suggest topics to review?`);

  }

}
