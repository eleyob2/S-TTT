<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slytherin App</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
    <div class="app">
      <div class="header">
        <h1>Quiz</h1>
          <div class="selects">
            <select id="modeSel" onchange="changeMode()">
              <option value="single">Single Player</option>
              <option value="multiplayer">Multiplayer</option>
            </select>
            <select id="subjectSel" onchange="changeSubject()">
              <option value="reading">Reading and English</option>
              <option value="math">Mathematics</option>
            </select>
            <select id="diffSel" onchange="changeDiff()">
              <option value="easy">Easy</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
      </div>
      <div class="points-row">
        <div class="progress-wrap">
          <div class="progress-labels">
            <span id="progLabel">Question 1 of 5</span>
            <span id="progPct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progFill" style="width:0%"></div>
          </div>
        </div>
        <span style="color:rgba(255,227,220,.7)">Total Points</span>
        <span class="pts-badge" id="pointsBadge">0 pts</span>
      </div>

      <div class="player-indicator" id="playerIndicator">
        <div class="player-badge player-1 active" id="player1Badge">
          <span class="player-badge-label">Player 1</span>
        </div>
        <div class="player-badge player-2" id="player2Badge">
          <span class="player-badge-label">Player 2</span>
        </div>
      </div>

        <div class="question-card" id="qCard">
        <div class="q-meta">
          <span class="q-num" id="qNum">Q1</span>
          <span class="q-diff diff-easy" id="qDiff">Easy</span>
        </div>
        <div class="q-text" id="qText">Loading question...</div>
        <div class="options" id="opts"></div>
        <div class="feedback" id="feedback">
          <div class="icon" id="fbIcon"></div>
          <span id="fbText"></span>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn btn-outline" id="prevBtn" onclick="navigate(-1)">← Previous</button>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
      </div>

    <div class="tracker">
      <div class="tracker-item">
        <div class="t-dot ok"></div>
        <span style="color:rgba(255,227,220,.6);font-size:11px">Correct</span>
        <span class="tracker-count ok-count" id="correctCount">0</span>
      </div>
      <div class="tracker-sep">|</div>
      <div class="tracker-item">
        <div class="t-dot bad"></div>
        <span style="color:rgba(255,227,220,.6);font-size:11px">Incorrect</span>
        <span class="tracker-count bad-count" id="incorrectCount">0</span>
      </div>
      <div class="tracker-sep">|</div>
      <div class="tracker-item">
        <span style="color:rgba(255,227,220,.6);font-size:11px">Skipped</span>
        <span class="tracker-count" style="color:rgba(255,227,220,.5)" id="skippedCount">0</span>
      </div>
    </div>
  </div>
    </div>

    <div class="subwaySurfersContainer" id="subwaySurfersContainer">
      <video width="203" height="360" autoplay loop muted id="subwaySurfers">
        <source src="./resources/subwaySurfers.mp4" type="video/mp4">
        Your browser cannot play the Subway Surfers video. Imagine Subway Surfers instead.
      </video>
    </div>
</body>
</html>
